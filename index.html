
<!DOCTYPE html>
<html lang="eng">
  <head>
    <title>smart-home</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h2>Bonjour Nawed!</h2>
      <figcaption id="header-right">
        <a href="#"><img src="image/bell-icon.jpg" alt="bell-icon"></a>
        <a href="#"> <img src="image/profile1.jpeg" alt="user-profile" width="70px" height="70px"> </a>
      </figcaption>
    </header>
    <div id="dashboard">

      <div class="card-lamp">
        <img src="image/lamp.webp" alt="lamp">
        <h2>Lampe du salon</h2>
        <h5>Salon</h5>
        <button>ON</button>
      </div>

      <div class="card-music">
        <img src="image/musique.svg" alt="music-icon">
        <h2>Musique</h2>
        <h5>Salon</h5>
        <button>ON</button>
      </div>

      <div class="card-temp">
        <img src="image/thermometer.png" alt="thermometer-icon">
        <h2>Température</h2>
        <h5>Chambre</h5>
        <button>ON</button>
      </div>

      <div class="card-security">
        <img src="image/securite.png" alt="security-icon">
        <h2>Sécurité</h2>
        <h5>Maison</h5>
        <button>ON</button>
      </div>

    </div>
  </body>

</html>
