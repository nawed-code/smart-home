<!DOCTYPE html >
<html lang="fr">
  <head>
  <title>SmartHome-Camera</title>
  <meta name="Nawed-code" >
  <meta charset="UTF-8">
  <style>
    header{
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 14px;
      height: 130px;
      margin-top: 0px;
    }
    header div{
      display: flex;
      align-items: center;
    }
    #smartHome{
      justify-content: left;
      gap: 2px;
    }
    #surveillance{
      justify-content: center;
      gap: 20px;
    }
    #surveillance img{
      width: 60px;
      height: 60px;
    }
    #user img,#smartHome img{
      width: 40px;
      height: 40px;
    }
    #user{
      justify-content: right;
      gap: 10px;
    }
   
    #container{
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
    }
    aside{
      display: grid;
      grid-template-rows: 1fr 2fr;
      gap: 8px;
      
    }
    .information{
      border: solid 1px black;
      border-radius: 4px;
      padding: 12px;
    }
    #searche input{
      margin-top: 8px;
      margin-right: 10px;
    }
    #monitor img{
      width: 600px;
      height: 400px;
    }
    
    
  </style>
  
  </head>
  <body>
    <header>
      <div id="smartHome">
        <img src="images/smart-house.png" alt="smarhome-logo">
        <h5>SmartHome</h5>
      </div>
      <div id="surveillance">
        <h1>Vidéo surveillance</h1>
        <img src="images/cctv.png" alt="cctv">
      </div>
      <div id="user">
        <a href="#"><img src="images/bell-icon.jpg" alt="cloche-logo"> </a>
        <a href="#"><img src="images/profile1.png" alt="user-logo"> </a>
      </div>
      
    </header>
    <div id="container">
      <aside>
        <div id="searche" class="information">
          <label for="">Veuillez écrire le nom de pièce: </label>
          <input type="text" name="text" placeholder="Nom de pièce" value="">
          <button>Chercher</button>
        </div>
        <div id="details" class="information">
          <p>Ici vous voyez les détails de chaque pièce </p>
        </div>
      </aside>
      <div id="monitor">
        <img src="images/jardin.png" alt="" >
      </div>
    </div>
  </body>
  

</html>
