<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>SmartHome-Position</title>
        <style>
            #container{
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 10px;
                margin: 12px;
                height: 100vh;
            }
            #map{
                width: 100%;
                height: 300px;
                border-radius: 10px;
            }
            #event{
                display: grid;
                grid-template-rows: 1fr 1fr;
                gap: 10px;
                overflow: hidden;

            }
            #actualite,
            #evenement{
                overflow-y: auto;
            }
            
        </style>
        <script src="position.js" defer></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    </head>
    <body>
        <header>
        </header>
        <div id="container">
            <div id="position">
                <h2>Recherche Ville</h2>
                <section id="search">
                    <input type="text" value="" placeholder="Ville">
                    <button>Cherche</button>
                    <span id="erreur"></span>
                </section>
                <section id="description">
                    <h3>Ville</h3>
                    <p>Aujourd'hui : <span id="date"></span>--<span id="temp">--</span>°C -- <span id="tempDesc">(ciel)</span></p>
                    <p>Vitesse du vent : <span id="speed"></span>-- Ressenti : <span id="ressenti">--</span>°C -- Minimume : <span id="min">--</span>°C </p>
                </section>
                <div id="map">

                </div>
            </div>
            <div id="event">
                <div id="actualite">
                    <h2>Evènements</h2>
                    
                </div>
                <div id="evenement">
                    <h2>Description</h2>
                    <p>Pour voire les descriptions veuillez choisir un évènement</p>
                </div>
            </div>
        </div>
    </body>
</html>
